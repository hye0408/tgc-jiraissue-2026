<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOC Jira Reporter</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="backdrop"></div>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">Netlify VOC Intake</p>
      <h1>대충 입력해도 정해진 양식으로<br>VOC Jira 이슈를 만드는 사이트</h1>
      <p class="hero-copy">
        고객사명, 메모, 화면 캡처를 넣으면 초안을 먼저 만들고
        확인 후 실제 Jira 이슈로 등록한다.
      </p>
      <div class="hero-badges">
        <span>VOC Type 자동 분류</span>
        <span>OpenAI 초안 생성</span>
        <span>Jira 즉시 연동</span>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div>
          <p class="panel-kicker">Step 1</p>
          <h2>이슈 정보 입력</h2>
        </div>
        <p class="panel-note">초안을 검토한 뒤 실제 Jira에 등록한다.</p>
      </div>

      <form id="issue-form" class="issue-form">
        <div class="form-grid">
          <label class="field field-wide">
            <span>짧은 메모</span>
            <textarea
              id="memo"
              name="memo"
              rows="7"
              placeholder="예: A고객사 결과표 화면에서 점수가 안 보임. 응시는 완료됐는데 결과 리포트가 빈 화면으로 나옴. 급함."
              required
            ></textarea>
          </label>

          <label class="field">
            <span>고객사명</span>
            <input id="customer_name" name="customer_name" type="text" placeholder="예: A고객사" required>
          </label>

          <label class="field">
            <span>이슈 유형</span>
            <select id="category" name="category">
              <option>자동 분류</option>
              <option>결과표 오류</option>
              <option>응시 오류</option>
              <option>관리자 오류</option>
              <option>데이터 오류</option>
              <option>기타</option>
            </select>
          </label>

          <label class="field">
            <span>VOC Type</span>
            <select id="voc_type" name="voc_type">
              <option>자동 분류</option>
              <option>결함</option>
              <option>개선의견</option>
              <option>기술지원</option>
              <option>문의</option>
            </select>
          </label>

          <label class="field">
            <span>심각도</span>
            <select id="severity" name="severity">
              <option>자동 판단</option>
              <option>Low</option>
              <option>Medium</option>
              <option>High</option>
              <option>Critical</option>
            </select>
          </label>

          <label class="field field-wide">
            <span>오류 화면 캡처 이미지</span>
            <input id="images" name="images" type="file" accept=".png,.jpg,.jpeg,.webp" multiple>
            <small>이미지 내용 분석은 아직 하지 않지만, 파일명과 첨부파일은 Jira에 함께 들어간다.</small>
          </label>
        </div>

        <div class="actions">
          <button id="draft-button" class="button button-primary" type="button">이슈 초안 작성하기</button>
          <button id="submit-button" class="button button-secondary" type="button" disabled>지라에 등록하기</button>
        </div>
      </form>
    </section>

    <section id="flash-area" class="stack"></section>

    <section id="draft-panel" class="panel hidden">
      <div class="panel-head">
        <div>
          <p class="panel-kicker">Step 2</p>
          <h2>생성된 이슈 초안</h2>
        </div>
        <p class="panel-note">초안을 확인한 뒤 등록 버튼을 누른다.</p>
      </div>
      <div id="draft-list" class="stack"></div>
    </section>

    <section id="result-panel" class="panel hidden">
      <div class="panel-head">
        <div>
          <p class="panel-kicker">Step 3</p>
          <h2>Jira 등록 결과</h2>
        </div>
        <p class="panel-note">생성된 이슈 키와 URL을 바로 확인할 수 있다.</p>
      </div>
      <div id="result-list" class="stack"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
